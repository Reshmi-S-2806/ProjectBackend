apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000       # Internal Cluster Port
      targetPort: 3000 # Port inside your Container
      nodePort: 30002  # THE EXTERNAL PORT for your browser (30000-32767)
  type: NodePort       # Changed from ClusterIP to NodePort
